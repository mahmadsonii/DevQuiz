<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DevQuiz Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <span id="user-coins">💰 Тангаҳо: 0</span>
        </div>

        <div id="lang-screen" class="screen">
            <h1>Интихоби Забон</h1>
            <div class="grid">
                <button onclick="showLevels('python')">Python</button>
                <button onclick="showLevels('html5')">HTML5</button>
                <button onclick="showLevels('css')">CSS3</button>
                <button onclick="showLevels('js')">JavaScript</button>
            </div>
            
            <div id="promo-section" style="margin-top: 25px; text-align: center;">
                <button id="insta-btn" class="level-btn" onclick="followInstagram()" 
                    style="background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); 
                           color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold;">
                   Инстаграм +50 танга
                </button>
            </div>
        </div>

        <div id="level-screen" class="screen hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 id="selected-lang-title" style="margin: 0;"></h2>
                <button class="reset-btn" onclick="resetLanguageProgress()" style="padding: 5px 10px;">
                    <span class="reset-icon">🔄</span> Аз нав
                </button>
            </div>
            <div id="levels-container" class="grid"></div>
        </div>

        <div id="quiz-screen" class="screen hidden">
            <div class="quiz-header">
                <span id="q-counter">1/10</span>
                <div class="progress-bar"><div id="progress"></div></div>
            </div>
            <h3 id="question-text"></h3>
            <div id="options" class="grid"></div>
        </div>
    </div>

    <script src="python.js"></script>
    <script src="html5.js"></script>
    <script src="css.js"></script>
    <script src="js.js"></script>
    <script src="questions.js"></script>

    <script src="script.js"></script>

    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
            .then(() => console.log("SW Registered!"))
            .catch(err => console.error("SW Error:", err));
        }
    </script>
</body>
</html>
